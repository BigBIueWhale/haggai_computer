# =============================================================================
# docker-compose.yml — deployment of Haggai's persistent desktop container.
#
# SPECIFIC, NOT CONFIGURABLE: every value here is a deliberate constant. The only
# runtime input to the system is the password, taken by ./setup.sh. Manage the
# container with ./setup.sh and ./teardown.sh — see README.md. Do NOT
# `docker compose down` / recreate in normal operation: that discards the
# writable layer where Haggai's `sudo apt install` packages live (see README
# "Persistence").
# =============================================================================
services:
  haggai_computer:
    build:
      context: .
      dockerfile: Dockerfile
    image: haggai_computer:1.4.7
    container_name: haggai_computer
    hostname: haggai-computer

    # --- Sovereign reach + web previews --------------------------------------
    # Publish the in-container RustDesk Direct-IP listener (21118) on the host at
    # the single fixed port 21128, on ALL interfaces (0.0.0.0) so it survives any
    # future LAN-IP change. The box is DMZ'd, so this is reachable from the public
    # internet at <public-ip>:21128 — that is the intended sovereign path (no
    # relay). Web preview ports are explicit: 3000 (Next.js), 5173 (Vite), and
    # 8080 (alternate preview) bind publicly. T3 Code's conventional 3773 port is
    # host-loopback-only; use a TLS reverse proxy/tunnel before sharing it.
    ports:
      - "21128:21118/tcp"
      - "3000:3000/tcp"
      - "5173:5173/tcp"
      - "8080:8080/tcp"
      - "127.0.0.1:3773:3773/tcp"

    # --- Network namespace: legacy default bridge (NOT a compose user-defined net) ---
    # The fork's R-A4 socket-surface self-check (src/direct_service.rs ->
    # hbb_common::socket_surface) REFUSES TO SERVE unless the --server's network
    # namespace holds EXACTLY one TCP listener (the pinned :21118) and ZERO UDP
    # sockets of any kind — its documented contract is "the box is the sole network
    # service in its namespace". A compose USER-DEFINED network runs Docker's
    # embedded DNS resolver at 127.0.0.11 (both a TCP and a UDP socket in this very
    # netns); that trips the assertion ("socket-surface violation — expected exactly
    # 1 TCP listener, found 2 ... [21118, <dns-port>]") and crash-loops the server
    # forever. The LEGACY `bridge` network has NO embedded resolver (it copies the
    # host's nameservers straight into resolv.conf), so the netns holds only the
    # :21118 listener and zero persistent UDP — exactly the surface R-A4 expects.
    # Port publishing (21128->21118) and outbound DNS both still work on it.
    # Trade-off: containers on the default bridge are not name-isolated from each
    # other, but this is the sole container here and every inbound connection is
    # still CPace-PAKE-gated (R-P14) — so isolation rests on the PAKE, not the net.
    network_mode: "bridge"

    # --- Isolation -----------------------------------------------------------
    # The persistent, isolated home is the ONLY part of the host the container can
    # see. Haggai cannot reach your files, your RustDesk/SSH/TeamViewer creds, or
    # anything else on the box.
    volumes:
      - ./home:/home/user

    # --- Persistence ---------------------------------------------------------
    # Survive host reboots/power-cuts: the daemon restarts THIS container (with its
    # writable layer intact, so apt installs persist). Do not change to "no".
    restart: unless-stopped

    # --- Resource caps (so Haggai cannot starve the host's own workloads) -----
    cpus: 8.0
    mem_limit: 16g
    memswap_limit: 16g          # == mem_limit ⇒ no swap blow-out
    pids_limit: 4096
    shm_size: 1g                # KDE + browsers want more than the 64m default

    # --- Hardening / blast-radius -------------------------------------------
    # NO privileged, NO docker.sock, NO host network, NO NVIDIA runtime. Default
    # seccomp + AppArmor are KEPT ON (never seccomp=unconfined). We deliberately
    # do NOT use cap_drop:ALL or no-new-privileges here, because both BREAK the
    # required `sudo apt install` (no-new-privileges blocks sudo's setuid
    # elevation; cap_drop:ALL strips the CHOWN/SETUID/DAC_OVERRIDE/NET_RAW that
    # apt/dpkg/sudo and Haggai's own net tools — nmap, tcpdump, ping — need). The
    # default Docker capability set + the structural limits above are the
    # isolation boundary. See docs/SECURITY.md for the full rationale.
    #
    # NO extra capabilities. Upstream 1.4.7 needed CAP_SYS_PTRACE so the ROOT
    # `rustdesk --password` could scan /proc to find the user `--server`. THE FORK
    # ELIMINATES THAT (R-D2): `--password` is reachable-own-IPC, so setup.sh runs it
    # as `user` (uid 1000) against its own uid-scoped socket — no /proc scan, no
    # cross-uid hop, no SYS_PTRACE. Dropping this capability is a strict
    # least-privilege improvement over the upstream deployment.
    init: true                  # reap zombies (tini as PID 1)

    # --- Health --------------------------------------------------------------
    # "Healthy" == the RustDesk Direct-IP listener is up inside the container.
    # The fork binds only after setup.sh sets the permanent password, so setup
    # waits for this healthcheck after password provisioning.
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn | grep -q ':21118 '"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
